name: Build & Push Builder Image

# Builds the toolchain image only when the Dockerfile itself changes (or on
# manual request) — NOT on every firmware push. The release workflow just
# pulls the resulting image, so day-to-day firmware builds stay fast.

on:
  push:
    branches: [main]
    paths:
      - 'docker/Dockerfile'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./docker
          push: true
          # EDIT ME: replace OWNER with your GitHub username/org, lowercase
          tags: ghcr.io/OWNER/escape32-builder:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
